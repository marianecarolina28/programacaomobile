<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora de Média</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
  }

  input {
    padding: 8px;
    margin: 5px;
  }

  button {
    padding: 10px;
    cursor: pointer;
  }

  #resultado {
    margin-top: 20px;
    font-size: 18px;
    white-space: pre-line;
  }
</style>

</head>
<body>

<h1>Calculadora de Média Escolar</h1>

<input type="text" id="nota1" placeholder="Nota 1"><br>
<input type="text" id="nota2" placeholder="Nota 2"><br>
<input type="text" id="nota3" placeholder="Nota 3 (trabalho/prova)"><br>

<button onclick="calcularMedia()">Calcular Média</button>

<p id="resultado"></p>

<script>
function calcularMedia() {
  let n1 = document.getElementById("nota1").value;
  let n2 = document.getElementById("nota2").value;
  let n3 = document.getElementById("nota3").value;
  let res = document.getElementById("resultado");

  // Validação: campos vazios
  if (n1 === "" || n2 === "" || n3 === "") {
    res.innerText = "Por favor, preencha todas as notas.";
    res.style.color = "black";
    return;
  }

  // Converter
  n1 = parseFloat(n1);
  n2 = parseFloat(n2);
  n3 = parseFloat(n3);

  // Validação: número
  if (isNaN(n1) || isNaN(n2) || isNaN(n3)) {
    res.innerText = "Digite apenas números válidos.";
    res.style.color = "black";
    return;
  }

  // Validação: intervalo
  if (
    n1 < 0 || n1 > 10 ||
    n2 < 0 || n2 > 10 ||
    n3 < 0 || n3 > 10
  ) {
    res.innerText = "As notas devem estar entre 0 e 10.";
    res.style.color = "black";
    return;
  }

  // Média com 3 notas
  let media = (n1 + n2 + n3) / 3;

  let situacao;

  if (media >= 7) {
    situacao = "Aprovado";
    res.style.color = "green";
  } else if (media >= 5) {
    situacao = "Recuperação";
    res.style.color = "orange";
  } else {
    situacao = "Reprovado";
    res.style.color = "red";
  }

  // Exibir resultado
  res.innerText = "Média: " + media.toFixed(1) + "\nSituação: " + situacao;

  // Limpar campos (extra)
  document.getElementById("nota1").value = "";
  document.getElementById("nota2").value = "";
  document.getElementById("nota3").value = "";
}
</script>

</body>
</html>
